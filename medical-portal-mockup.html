<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const C = {
  primary: '#1A365D', primaryMid: '#2D4A7A', primaryLight: '#3769AF',
  accent: '#F97316', accentDark: '#EA6C10',
  success: '#059669', warning: '#D97706', danger: '#DC2626',
  text: '#0F1F3D', textMid: '#3D5280', textLight: '#8096B8',
  border: 'rgba(26,54,93,0.12)', borderLight: 'rgba(255,255,255,0.80)',
};

/* ── グラスカード ── */
const Card = ({ children, style, className = '' }) => (
  <div className={`glass ${className}`} style={{ padding: 20, ...style }}>
    {children}
  </div>
);

const SectionTitle = ({ children, sub }) => (
  <div style={{ marginBottom: 14 }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <div style={{ width: 3, height: 18, borderRadius: 2, background: `linear-gradient(to bottom, ${C.accent}, #FBBF24)`, flexShrink: 0 }} />
      <span style={{ fontSize: 13, fontWeight: 700, color: C.text, letterSpacing: '0.01em' }}>{children}</span>
    </div>
    {sub && <p style={{ fontSize: 11, color: C.textLight, marginTop: 3, marginLeft: 11 }}>{sub}</p>}
  </div>
);

/* ──────────────────────────────────────────
   n数計算ロジック
────────────────────────────────────────── */
function calcN(tags, logic, ageMin, ageMax, gender, yearStart, yearEnd) {
  const BASE = 500000;
  const lo = Math.min(ageMin, ageMax), hi = Math.max(ageMin, ageMax);
  const ageFactor    = Math.max(0.005, (hi - lo) / 100);
  const genderFactor = gender === 'all' ? 1.0 : 0.47;
  const yearFactor   = Math.max(1, parseInt(yearEnd) - parseInt(yearStart) + 1) / 6;
  let condFactor;
  if (tags.length === 0)        condFactor = 0.85;
  else if (logic === 'AND')     condFactor = Math.pow(0.60, tags.length);
  else                          condFactor = Math.min(0.90, 0.24 * tags.length + 0.06);
  return Math.max(0, Math.round(BASE * ageFactor * genderFactor * yearFactor * condFactor));
}

/* ── ピラミッドチャート ── */
function PyramidChart({ ageMin = 0, ageMax = 100, gender = 'all' }) {
  const lo = Math.min(ageMin, ageMax), hi = Math.max(ageMin, ageMax);
  const ALL_ROWS = [
    { label:'80歳以上', minA:80, maxA:100, mBase:38, fBase:62 },
    { label:'70-79歳',  minA:70, maxA:79,  mBase:72, fBase:85 },
    { label:'60-69歳',  minA:60, maxA:69,  mBase:90, fBase:82 },
    { label:'50-59歳',  minA:50, maxA:59,  mBase:78, fBase:70 },
    { label:'40-49歳',  minA:40, maxA:49,  mBase:58, fBase:52 },
    { label:'30-39歳',  minA:30, maxA:39,  mBase:32, fBase:28 },
    { label:'20-29歳',  minA:20, maxA:29,  mBase:18, fBase:15 },
  ];
  const rows = ALL_ROWS.map(r => ({
    ...r,
    active: r.maxA >= lo && r.minA <= hi,
    m: gender === 'female' ? 0 : r.mBase,
    f: gender === 'male'   ? 0 : r.fBase,
  }));
  const BW = 108, LW = 70, rh = 27, pad = 6;
  const totalW = BW * 2 + LW + 20;
  const totalH = rows.length * rh + 44;
  return (
    <svg viewBox={`0 0 ${totalW} ${totalH}`} width="100%">
      <defs>
        <linearGradient id="gradM" x1="1" y1="0" x2="0" y2="0">
          <stop offset="0%" stopColor="#3769AF" stopOpacity="0.9"/>
          <stop offset="100%" stopColor="#5B8DD9" stopOpacity="0.75"/>
        </linearGradient>
        <linearGradient id="gradF" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#DB2777" stopOpacity="0.75"/>
          <stop offset="100%" stopColor="#EC4899" stopOpacity="0.9"/>
        </linearGradient>
      </defs>
      {gender !== 'female' && <text x={BW/2} y={14} textAnchor="middle" fontSize={9.5} fill="#3769AF" fontWeight="700" letterSpacing="0.5">男性 (%)</text>}
      <text x={BW+LW/2+10} y={14} textAnchor="middle" fontSize={9.5} fill={C.textMid} fontWeight="600">年齢層</text>
      {gender !== 'male'   && <text x={BW+LW+BW/2+20} y={14} textAnchor="middle" fontSize={9.5} fill="#DB2777" fontWeight="700" letterSpacing="0.5">女性 (%)</text>}
      {rows.map((r, i) => {
        const y = 20 + i * rh;
        const mW = (r.m / 100) * (BW - pad);
        const fW = (r.f / 100) * (BW - pad);
        const op = r.active ? 1 : 0.18;
        return (
          <g key={r.label}>
            {gender !== 'female' && <rect x={BW - mW - pad} y={y+3} width={mW} height={rh-6} fill="url(#gradM)" rx={4} opacity={op}/>}
            {gender !== 'male'   && <rect x={BW+LW+20+pad}  y={y+3} width={fW} height={rh-6} fill="url(#gradF)" rx={4} opacity={op}/>}
            <text x={BW+LW/2+10} y={y+16} textAnchor="middle" fontSize={8.5} fill={r.active ? C.text : C.textLight} fontWeight={r.active ? '600' : '400'}>{r.label}</text>
            {gender !== 'female' && r.m > 0 && r.active && <text x={BW-mW-pad-3} y={y+16} textAnchor="end" fontSize={7.5} fill={C.textLight}>{r.m}%</text>}
            {gender !== 'male'   && r.f > 0 && r.active && <text x={BW+LW+fW+26}   y={y+16} textAnchor="start" fontSize={7.5} fill={C.textLight}>{r.f}%</text>}
          </g>
        );
      })}
      <line x1={BW}       y1={18} x2={BW}       y2={totalH-6} stroke={C.border} strokeDasharray="2,2"/>
      <line x1={BW+LW+20} y1={18} x2={BW+LW+20} y2={totalH-6} stroke={C.border} strokeDasharray="2,2"/>
      {rows.some(r => !r.active) && (
        <text x={totalW/2} y={totalH} textAnchor="middle" fontSize={7.5} fill={C.accent} opacity={0.7}>▲ 網掛け = 選択範囲外</text>
      )}
    </svg>
  );
}

/* ── 縦棒グラフ ── */
function BarChart({ data, colorA = '#3769AF', colorB = '#5B8DD9', height = 100 }) {
  const id = `bg${Math.random().toString(36).slice(2,6)}`;
  const maxV = Math.max(...data.map(d => d.v), 1);
  const W = 300, H = height;
  const bw = (W - 20) / data.length - 5;
  return (
    <svg viewBox={`0 0 ${W} ${H + 30}`} width="100%">
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={colorA} stopOpacity="0.92"/>
          <stop offset="100%" stopColor={colorB} stopOpacity="0.65"/>
        </linearGradient>
      </defs>
      {data.map((d, i) => {
        const bh = Math.max(2, (d.v / maxV) * H);
        const x  = 10 + i * ((W - 20) / data.length);
        const y  = H - bh;
        const lbl = d.v >= 10000 ? `${(d.v/10000).toFixed(1)}万` : d.v >= 1000 ? `${(d.v/1000).toFixed(1)}k` : String(d.v);
        return (
          <g key={d.l}>
            <rect x={x} y={y} width={bw} height={bh} fill={`url(#${id})`} rx={4}/>
            <text x={x+bw/2} y={y-4} textAnchor="middle" fontSize={7.5} fill={C.textMid} fontWeight="600">{lbl}</text>
            <text x={x+bw/2} y={H+14} textAnchor="middle" fontSize={8} fill={C.textLight}>{d.l}</text>
          </g>
        );
      })}
      <line x1={8} y1={H} x2={W} y2={H} stroke={C.border}/>
    </svg>
  );
}

/* ── 折れ線グラフ ── */
function LineChart({ data }) {
  if (!data || data.length < 2) return (
    <div style={{ textAlign:'center', padding:'20px 0', color:C.textLight, fontSize:12 }}>期間を2年以上選択してください</div>
  );
  const W = 320, H = 72, px = 16, py = 10;
  const vals = data.map(d => d.v);
  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
  const pts = data.map((d, i) => [
    px + (i / (data.length - 1)) * (W - px * 2),
    py + (1 - (d.v - mn) / rng) * (H - py * 2),
  ]);
  const line = `M${pts.map(p => p.join(',')).join(' L')}`;
  const area = `M${pts[0]} L${pts.map(p => p.join(',')).join(' L')} L${pts[pts.length-1][0]},${H-py} L${pts[0][0]},${H-py} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H + 20}`} width="100%">
      <defs>
        <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor="#3769AF" stopOpacity="0.20"/>
          <stop offset="100%" stopColor="#3769AF" stopOpacity="0.01"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#lineGrad)"/>
      <path d={line} stroke="#3769AF" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p, i) => (
        <g key={i}>
          <circle cx={p[0]} cy={p[1]} r={4} fill="white" stroke="#3769AF" strokeWidth="2"/>
          <text x={p[0]} y={H+15} textAnchor="middle" fontSize={8.5} fill={C.textLight}>{data[i].l}</text>
          <text x={p[0]} y={p[1]-9} textAnchor="middle" fontSize={8} fill={C.textMid} fontWeight="600">
            {data[i].v >= 1000 ? `${(data[i].v/1000).toFixed(1)}k` : data[i].v}
          </text>
        </g>
      ))}
    </svg>
  );
}

/* ══════════════════════════════════════════

function ResearchSearchScreen({ setTab }) {

  const ALL_PAPERS = [

}

  useEffect(() => {

    return () => clearTimeout(t);
  }, [tags, logic, ageMin, ageMax, gender, obsStart, obsEnd]);

  const n = useMemo(() => calcN(tags, logic, ageMin, ageMax, gender, obsStart, obsEnd),
    [tags, logic, ageMin, ageMax, gender, obsStart, obsEnd]);

    { l:'高血圧', r:0.61 }, { l:'脂質異常', r:0.50 },
    { l:'CKD',   r:0.30 }, { l:'心不全',   r:0.17 }, { l:'脳卒中', r:0.15 },

  const TREND_SHAPE = { '2018':0.64,'2019':0.70,'2020':0.58,'2021':0.74,'2022':0.88,'2023':1.00 };
  const trendData = Object.entries(TREND_SHAPE)
    .filter(([y]) => parseInt(y) >= parseInt(obsStart) && parseInt(y) <= parseInt(obsEnd))
    .map(([y,f]) => ({ l:`'${y.slice(2)}`, v:Math.max(10, Math.round(n * f / 100)) }));

  const suggestions = [
    { label:'E11 2型糖尿病',       type:'disease' },
    { label:'E14 詳細不明の糖尿病',  type:'disease' },
    { label:'N18 慢性腎臓病(CKD)',  type:'disease' },
    { label:'I25 慢性虚血性心疾患', type:'disease' },
    { label:'E78 脂質異常症',       type:'disease' },
    { label:'F00 アルツハイマー病', type:'disease' },
    { label:'インスリン製剤',       type:'drug' },
    { label:'SGLT2阻害薬',         type:'drug' },
    { label:'GLP-1受容体作動薬',   type:'drug' },
    { label:'DPP-4阻害薬',         type:'drug' },
  ];
  const filtered = query.length > 0 ? suggestions.filter(s => s.label.includes(query)) : suggestions.slice(0,6);
  const addTag = s => { if(tags.find(t=>t.label===s.label))return; setTags(p=>[...p,{id:Date.now(),...s}]); setQuery(''); setShowSug(false); };
  const removeTag = id => setTags(p => p.filter(t => t.id !== id));
  const lo = Math.min(ageMin, ageMax), hi = Math.max(ageMin, ageMax);
  const privacyWarn = n < 100;

  const inputStyle = { width:'100%', padding:'9px 13px', fontSize:13, color:C.text };

  return (
    <div className="slide-up" style={{ display:'grid', gridTemplateColumns:'390px 1fr', gap:20, minHeight:660 }}>

        </div>

            <input value={query}

            {showSug && filtered.length > 0 && (

function BenchmarkChart({ comparison, breakdown, appliedGender = '全体', appliedInsurer = '全体', appliedAge = '全年齢' }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);
  useEffect(() => {
    if (typeof Chart === 'undefined') return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const ctx = canvasRef.current.getContext('2d');
    const d = (BENCH_DATA[comparison] || BENCH_DATA.national)[breakdown] || BENCH_DATA.national['全体'];
    // 性別・保険者・年齢フィルタによる倍率
    const iKey = INSURER_KEY_MAP[appliedInsurer] || 'all';
    const noGenderScale = breakdown === '男性' || breakdown === '女性' || breakdown === '年代×性別';
    const noAgeScale    = breakdown === '年代別' || breakdown === '年代×性別';
    const gMult = noGenderScale ? 1 : (GENDER_MULT[appliedGender] || 1);
    const iMult = INS_MULT[iKey] || 1;
    const aMult = noAgeScale ? 1 : (AGE_COST_MULT[appliedAge] || 1);
    const sc = v => parseFloat((v * gMult * iMult * aMult).toFixed(1));
    let datasets, xLabels, yTitle;
    if (breakdown === '年代×性別') {
      xLabels = d.labels;
      yTitle  = '万円/人（2023年）';
      datasets = [
        { label: 'A市（男性）', data: d.mCity.map(v => sc(v)), backgroundColor: 'rgba(55,105,175,0.88)', borderRadius: 4 },
        { label: 'A市（女性）', data: d.fCity.map(v => sc(v)), backgroundColor: 'rgba(219,39,119,0.78)', borderRadius: 4 },
        { label: `${d.cl}（男性）`, data: d.mComp.map(v => sc(v)), backgroundColor: 'rgba(55,105,175,0.30)', borderRadius: 4, borderWidth: 1.5, borderColor: 'rgba(55,105,175,0.70)', borderSkipped: false },
        { label: `${d.cl}（女性）`, data: d.fComp.map(v => sc(v)), backgroundColor: 'rgba(219,39,119,0.26)', borderRadius: 4, borderWidth: 1.5, borderColor: 'rgba(219,39,119,0.60)', borderSkipped: false },
      ];
    } else {
      xLabels = breakdown === '年代別' ? d.labels : ['2019','2020','2021','2022','2023'];
      yTitle  = breakdown === '年代別' ? '万円/人（2023年）' : '万円/人';
      datasets = [
        { label: `A市${breakdown !== '全体' ? `（${breakdown}）` : ''}`, data: d.city.map(v => sc(v)), backgroundColor: 'rgba(249,115,22,0.85)', borderRadius: 4 },
        { label: d.cl, data: d.comp.map(v => sc(v)), backgroundColor: 'rgba(55,105,175,0.7)', borderRadius: 4 },
      ];
    }
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: { labels: xLabels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,

function calcAppliedCount(age, disease, gender, insurer) {
  const base   = (COUNT_BASE[disease]||COUNT_BASE['2型糖尿病'])[age] || 12847;
  const iKey   = INSURER_KEY_MAP[insurer] || 'all';
  const iRatio = INS_CNT[iKey] !== undefined ? INS_CNT[iKey] : 1;
  const gMult  = gender === '男性' ? 0.51 : gender === '女性' ? 0.49 : 1;
  return Math.round(base * iRatio * gMult).toLocaleString();
}

                          `    <span class="sql-fn">COUNT</span>(*) <span class="sql-kw">AS</span> patient_cnt,\n` +
                          `    <span class="sql-fn">ROUND</span>(<span class="sql-fn">SUM</span>(iryohi_total) / <span class="sql-fn">COUNT</span>(*) / 10000, 1)\n` +

                          `<span class="sql-kw">FROM</span>  <span class="sql-tbl">ndb.medical_receipt_mn</span> r\n` +

                      <span style={{ fontSize:8, color:C.textLight, flexShrink:0, marginLeft:3 }}>{col.type}</span>
                      <div className="data-tip-box" style={{ left:'100%', top:'-4px', marginLeft:6, minWidth:220 }}>
                        <div style={{ fontSize:10, fontWeight:700, color:'rgba(255,255,255,0.92)', marginBottom:6, fontFamily:'monospace' }}>{col.name}</div>
                        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                          <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{ color:'rgba(148,163,184,0.80)', fontSize:9.5 }}>型</span><span style={{ color:'#93C5FD', fontSize:9.5, fontFamily:'monospace' }}>{col.type}</span></div>
                          <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{ color:'rgba(148,163,184,0.80)', fontSize:9.5 }}>欠損率</span><span style={{ color:col.miss&&col.miss!=='0%'?'#FCA5A5':'#6EE7B7', fontSize:9.5, fontWeight:700 }}>{col.miss||'0%'}</span></div>
                          {col.min  && <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{ color:'rgba(148,163,184,0.80)', fontSize:9.5 }}>最小値</span><span style={{ color:'rgba(226,232,240,0.88)', fontSize:9.5 }}>{col.min}</span></div>}
                          {col.max  && <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{ color:'rgba(148,163,184,0.80)', fontSize:9.5 }}>最大値</span><span style={{ color:'rgba(226,232,240,0.88)', fontSize:9.5 }}>{col.max}</span></div>}
                          {col.mean && <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{ color:'rgba(148,163,184,0.80)', fontSize:9.5 }}>平均値</span><span style={{ color:'rgba(226,232,240,0.88)', fontSize:9.5 }}>{col.mean}</span></div>}
                          {col.note && <div style={{ marginTop:4, fontSize:9, color:'#FCD34D', borderTop:'1px solid rgba(255,255,255,0.08)', paddingTop:4 }}>{col.note}</div>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          ))}
        </div>

        {/* ── 中央ペイン: テンプレート + Databricks ノートブックセル ── */}
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {/* テンプレート選択 */}
          <div className="glass" style={{ borderRadius:13, padding:'11px 12px', border:'1px solid rgba(26,54,93,0.10)' }}>
            <div style={{ fontSize:10.5, fontWeight:700, color:C.textMid, marginBottom:8, letterSpacing:'0.03em' }}>解析テンプレート</div>
            <div style={{ display:'flex', gap:7, overflowX:'auto', paddingBottom:3 }}>
              {templates.map((t, idx) => (
                <button key={t.id} onClick={() => { setSelTemplate(t.id); setCellDone(false); setCellRunning(false); clearTimeout(timerRef.current); }}
                  style={{ flexShrink:0, padding:'8px 12px', border:`1px solid ${selTemplate===t.id?'rgba(249,115,22,0.50)':'rgba(26,54,93,0.12)'}`, borderRadius:10, background:selTemplate===t.id?'rgba(249,115,22,0.09)':'rgba(26,54,93,0.03)', cursor:'pointer', textAlign:'left', minWidth:128, transition:'all 0.18s' }}>
                  <div style={{ fontSize:9.5, color:C.textLight, marginBottom:2 }}>{['①','②','③','④','⑤'][idx]}</div>
                  <div style={{ fontSize:12, fontWeight:600, color:C.text, marginBottom:2 }}>{t.icon} {t.title}</div>
                  <div style={{ fontSize:9.5, color:selTemplate===t.id?'#C2570D':C.textLight }}>{t.sub}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Notebook コンテナ */}
          <div className="glass" style={{ borderRadius:13, border:'1px solid rgba(26,54,93,0.10)', overflow:'hidden' }}>
            {/* Git ヘッダーバー */}
            <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 14px', background:'rgba(15,23,42,0.88)', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
              <span style={{ fontSize:9.5, color:'rgba(100,116,139,0.90)', fontFamily:'monospace' }}>📓 notebook.py</span>
              <div style={{ height:13, width:1, background:'rgba(255,255,255,0.08)' }}/>
              <span style={{ fontSize:9.5, color:'#6EE7B7', fontFamily:'monospace' }}>🔀 branch: <strong>main</strong></span>
              <button onClick={() => setGitPushed(v => !v)}
                style={{ marginLeft:'auto', padding:'3px 9px', fontSize:9.5, fontWeight:700, border:'none', borderRadius:6, cursor:'pointer', background:gitPushed?'rgba(5,150,105,0.18)':'rgba(249,115,22,0.14)', color:gitPushed?'#6EE7B7':'#C2570D', transition:'all 0.2s' }}>
                {gitPushed ? '✅ Push済み' : '💾 コミット・Push'}
              </button>
            </div>
            {/* 言語トグル */}
            <div style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 14px', background:'rgba(15,23,42,0.60)', borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
              <span style={{ fontSize:9.5, color:'rgba(148,163,184,0.70)', fontWeight:600 }}>言語:</span>
              <div style={{ display:'flex', background:'rgba(255,255,255,0.05)', borderRadius:7, padding:2, gap:1 }}>
                {[['python','Python'],['sql','SQL'],['r','R']].map(([k,l]) => (
                  <button key={k} onClick={() => setLang(k)}
                    style={{ padding:'3px 11px', fontSize:10, fontWeight:lang===k?700:400, border:'none', borderRadius:5, cursor:'pointer', background:lang===k?langBg[k]:'transparent', color:lang===k?langCl[k]:'rgba(148,163,184,0.70)', transition:'all 0.15s' }}>
                    {l}
                  </button>
                ))}
              </div>
              <span style={{ fontSize:9, padding:'2px 8px', background:langBg[lang], color:langCl[lang], border:`1px solid ${langCl[lang]}55`, borderRadius:5, fontFamily:'monospace', fontWeight:700 }}>
                {langMag[lang]}
              </span>
            </div>

            {/* ─ コードセル（Databricks スタイル） ─ */}
            <div style={{ borderBottom: (cellRunning||cellDone) ? '2px solid rgba(55,105,175,0.22)' : 'none' }}>
              {/* セルヘッダー: In[n]: + 実行ボタン */}
              <div style={{ display:'flex', alignItems:'center', padding:'5px 12px 5px 10px', background:'rgba(15,23,42,0.72)', borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
                <span style={{ fontFamily:'monospace', fontSize:9, color:'rgba(100,116,139,0.55)', userSelect:'none', minWidth:44 }}>
                  In [{cellDone ? '1' : ' '}]:
                </span>
                <div style={{ marginLeft:'auto', display:'flex', gap:6, alignItems:'center' }}>
                  <button onClick={runCell} disabled={cellRunning}
                    style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 13px', fontSize:10.5, fontWeight:700, border:`1px solid ${cellRunning?'rgba(26,54,93,0.20)':'rgba(249,115,22,0.42)'}`, borderRadius:7, cursor:cellRunning?'default':'pointer', background:cellRunning?'rgba(26,54,93,0.12)':'rgba(249,115,22,0.11)', color:cellRunning?C.textLight:'#C2570D', transition:'all 0.2s' }}>
                    {cellRunning
                      ? <><span className="spin" style={{ display:'inline-block' }}>⟳</span> 実行中…</>
                      : <><span>▶</span> 実行 <kbd style={{ fontSize:8.5, padding:'1px 5px', background:'rgba(249,115,22,0.10)', border:'1px solid rgba(249,115,22,0.28)', borderRadius:3, fontFamily:'monospace', fontWeight:400 }}>Shift+Enter</kbd></>}
                  </button>
                </div>
              </div>
              {/* コードエリア */}
              <pre style={{ margin:0, padding:'14px 16px', fontSize:10.5, lineHeight:1.80, fontFamily:'monospace', color:'rgba(226,232,240,0.88)', background:'rgba(15,23,42,0.93)', minHeight:185, overflowX:'auto', whiteSpace:'pre-wrap', wordBreak:'break-all' }}>
                {curSnip || '# テンプレートを選択してください'}
              </pre>
            </div>

            {/* ─ 出力エリア（コードセルの直下・Databricks スタイル） ─ */}
            {(cellRunning || cellDone) && (
              <div style={{ background:'rgba(250,251,255,0.94)', borderTop:'none', padding:'12px 16px' }}>
                {/* Out[n]: ヘッダー */}
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom: cellDone ? 12 : 0 }}>
                  <span style={{ fontFamily:'monospace', fontSize:9, color:'rgba(100,116,139,0.60)', userSelect:'none', minWidth:44 }}>
                    Out [{cellDone ? '1' : ' '}]:
                  </span>
                  {cellRunning && (
                    <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                      <span className="spin" style={{ display:'inline-block', color:C.accent, fontSize:14 }}>⟳</span>
                      <span style={{ fontSize:9.5, color:C.textLight }}>処理中…</span>
                    </div>
                  )}
                  {cellDone && (
                    <span style={{ marginLeft:'auto', fontSize:9, color:C.success, background:'rgba(5,150,105,0.08)', border:'1px solid rgba(5,150,105,0.22)', borderRadius:5, padding:'2px 8px' }}>
                      ✅ {execTime}s
                    </span>
                  )}
                </div>
                {cellDone && (
                  <div className="fade-in">
                    {selTemplate==='eda'      && <AcOutEDA/>}
                    {selTemplate==='preproc'  && <AcOutPreproc/>}
                    {selTemplate==='join'     && <AcOutJoin/>}
                    {selTemplate==='survival' && <AcOutSurvival/>}
                    {selTemplate==='ml'       && <AcOutML/>}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* ── 右ペイン: コホート + クラスター + Airlock ── */}
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <Card>
            <SectionTitle sub="コホート参照画面から引き継ぎ">エクスポート済みコホート</SectionTitle>
            <div style={{ background:'rgba(26,54,93,0.04)', borderRadius:10, padding:'11px 13px', border:'1px solid rgba(26,54,93,0.08)', marginBottom:4 }}>
              <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:6 }}>
                <span style={{ fontSize:26, fontWeight:800, color:C.accent, letterSpacing:'-0.04em' }}>12,847</span>
                <span style={{ fontSize:11, color:C.textLight }}>名</span>
              </div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:5 }}>
                {['E11 2型糖尿病','I10 本態性高血圧症'].map(d => <span key={d} className="chip-disease" style={{ fontSize:9.5, padding:'2px 7px', borderRadius:5 }}>{d}</span>)}
                <span className="chip-drug" style={{ fontSize:9.5, padding:'2px 7px', borderRadius:5 }}>メトホルミン</span>
              </div>
              <div style={{ fontSize:10, color:C.textLight }}>60–85歳 · NDB 2021–2023年</div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:10, color:'#065F46', background:'rgba(5,150,105,0.07)', border:'1px solid rgba(5,150,105,0.18)', borderRadius:8, padding:'6px 10px', marginTop:7 }}>
              <span>✅</span> Delta Lake <code style={{ fontFamily:'monospace', background:'rgba(5,150,105,0.12)', padding:'0 4px', borderRadius:4, fontSize:9 }}>ndb_2021_2023</code>
            </div>
          </Card>

          <Card>
            <SectionTitle>クラスター設定</SectionTitle>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:4 }}>
              {[['クラスタータイプ',['Standard_DS3_v2（共有）','Standard_DS4_v2（専有）','Standard_DS5_v2（大規模）']],['ノード数',['4 ノード','8 ノード','16 ノード']],['タイムアウト',['60 分','120 分','240 分']]].map(([label,opts]) => (
                <div key={label}>
                  <label style={{ fontSize:9.5, fontWeight:700, color:C.textMid, display:'block', marginBottom:4 }}>{label}</label>
                  <select className="input-glass" style={{ width:'100%', padding:'6px 8px', fontSize:10.5 }}>
                    {opts.map(o => <option key={o}>{o}</option>)}
                  </select>
                </div>
              ))}
            </div>
          </Card>

          {cellDone && (
            <Card className="slide-up">
              <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:10 }}>
                <span style={{ fontSize:12 }}>✅</span>
                <span style={{ fontSize:11, fontWeight:700, color:C.success }}>セル実行完了</span>
                <span style={{ marginLeft:'auto', fontSize:9.5, color:C.textLight, fontFamily:'monospace' }}>{execTime}s</span>
              </div>
              <button className="airlock-btn" onClick={() => openAcAirlock('セル実行結果（' + templates.find(t=>t.id===selTemplate)?.title + '）')}
                style={{ width:'100%', textAlign:'center', padding:'9px', fontSize:11 }}>
                🔐 Airlock 持出申請
              </button>
            </Card>
          )}

          {!cellRunning && !cellDone && (
            <div className="glass" style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:10, padding:32, border:'1px dashed rgba(26,54,93,0.16)', minHeight:160, borderRadius:13 }}>
              <div style={{ fontSize:38, opacity:0.12 }}>⬡</div>
              <div style={{ fontSize:10.5, color:C.textLight, textAlign:'center', lineHeight:1.9 }}>
                テンプレートを選択して<br/>「▶ 実行」を押してください
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* DatabricksScreen: モード切替 */
function DatabricksScreen() {
  const [mode, setMode] = useState('municipal');
  return (
    <div className="slide-up">
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20, padding:'14px 20px', background:'rgba(255,255,255,0.65)', backdropFilter:'blur(12px)', borderRadius:14, border:'1px solid rgba(26,54,93,0.10)', boxShadow:'0 2px 12px rgba(26,54,93,0.07)' }}>
        <span style={{ fontSize:12, fontWeight:700, color:C.textMid }}>利用者モード：</span>
        <div style={{ display:'flex', background:'rgba(26,54,93,0.07)', borderRadius:10, padding:3, gap:2 }}>
          {[['municipal','🏢 自治体・保険者モード'],['academia','👨‍🔬 アカデミア・研究者モード']].map(([val, label]) => (
            <button key={val} onClick={() => setMode(val)}
              style={{
                padding:'8px 18px', fontSize:12.5, fontWeight:600, borderRadius:8, border:'none', cursor:'pointer', transition:'all 0.2s',
                background: mode===val ? 'linear-gradient(135deg,#1A365D,#3769AF)' : 'transparent',
                color: mode===val ? '#fff' : C.textMid,
                boxShadow: mode===val ? '0 2px 10px rgba(26,54,93,0.30)' : 'none',
              }}>
              {label}
            </button>
          ))}
        </div>
        <div style={{ marginLeft:'auto', fontSize:11, color:C.textLight }}>
          {mode === 'municipal' ? '📊 ノーコードで医療費分析' : '🔬 Databricks 解析ジョブ実行'}
        </div>
      </div>
      {mode === 'municipal' ? <MunicipalMode/> : <AcademiaMode/>}
    </div>
  );
}

/* ══════════════════════════════════════════
   ヘッダー
══════════════════════════════════════════ */

    <header className="glass-dark" style={{ padding:'0 24px', height:56, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
      <div style={{ display:'flex', alignItems:'center', gap:18 }}>
        <div style={{ display:'flex', alignItems:'center', gap:11 }}>
          <div style={{ width:32, height:32, background:'linear-gradient(135deg,#F97316,#FBBF24)', borderRadius:9, display:'flex', alignItems:'center', justifyContent:'center', fontSize:17, boxShadow:'0 2px 10px rgba(249,115,22,0.45)' }}>⚕</div>
          <div>
            <div style={{ color:'rgba(255,255,255,0.96)', fontWeight:700, fontSize:14.5, lineHeight:1, letterSpacing:'-0.02em' }}>医療等情報活用基盤ポータル</div>
          </div>
        </div>
        <div style={{ height:26, width:1, background:'rgba(255,255,255,0.08)' }}/>
        <div style={{ display:'flex', gap:5 }}>
          {['NDB','DPC','レセプト','電子カルテ(試)'].map(db => (
            <span key={db} style={{ padding:'2px 8px', background:'rgba(55,105,175,0.20)', border:'1px solid rgba(55,105,175,0.30)', borderRadius:5, fontSize:9.5, color:'rgba(147,197,253,0.90)', fontWeight:600, letterSpacing:'0.04em' }}>{db}</span>
          ))}
        </div>
        {/* 認可コンテキストバッジ */}
        <div className="auth-tip-wrap">
          <div style={{ display:'flex', alignItems:'center', gap:6, padding:'4px 12px', background:'rgba(5,150,105,0.15)', border:'1px solid rgba(5,150,105,0.38)', borderRadius:999, cursor:'default' }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'#4ADE80', display:'inline-block', flexShrink:0, boxShadow:'0 0 6px rgba(74,222,128,0.60)' }}/>
            <span style={{ fontSize:10, color:'#6EE7B7', fontWeight:700, letterSpacing:'0.01em', whiteSpace:'nowrap' }}>🔒 認可コンテキスト: A市 データヘルス計画策定権限</span>
          </div>
          <div className="auth-tip-box">
            <div style={{ color:'#6EE7B7', fontWeight:700, fontSize:12, marginBottom:8 }}>🔐 アクセス制御ポリシー</div>
            <div style={{ color:'rgba(226,232,240,0.80)', fontSize:10.5, marginBottom:10, lineHeight:1.6 }}>
              認証済みユーザー: <strong style={{ color:'white' }}>太郎（A市 保健予防課）</strong>
            </div>
            <div style={{ fontSize:9.5, fontWeight:700, color:'rgba(148,163,184,0.75)', marginBottom:6, letterSpacing:'0.05em', textTransform:'uppercase' }}>閲覧可能データ</div>
            {[['NDB','A県分 レセプト・特定健診'],['特定健診DB','A市 2019–2023年分'],['後期高齢DB','参照のみ（詳細は制限）']].map(([d,desc]) => (
              <div key={d} style={{ display:'flex', gap:7, alignItems:'center', marginBottom:5 }}>
                <span style={{ fontSize:9.5, padding:'1px 7px', background:'rgba(55,105,175,0.25)', color:'#93C5FD', borderRadius:4, fontWeight:700, flexShrink:0 }}>{d}</span>
                <span style={{ fontSize:10, color:'rgba(226,232,240,0.65)' }}>{desc}</span>
              </div>
            ))}
            <div style={{ marginTop:10, padding:'7px 10px', background:'rgba(249,115,22,0.10)', border:'1px solid rgba(249,115,22,0.28)', borderRadius:8, fontSize:10, color:'rgba(253,186,116,0.90)', lineHeight:1.6 }}>
              ⚠️ 個票データへのアクセスは不可。統計値の参照のみ許可（個人情報保護法 準拠）
            </div>
          </div>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:11.5, color:'rgba(100,116,139,0.80)' }}>
          <span className="pulse" style={{ width:6, height:6, background:'#4ADE80', borderRadius:'50%', display:'inline-block', boxShadow:'0 0 6px rgba(74,222,128,0.55)' }}/>
          システム正常稼働中
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.10)', borderRadius:999, padding:'4px 14px 4px 4px', cursor:'pointer', backdropFilter:'blur(12px)' }}>
          <div style={{ width:28, height:28, borderRadius:'50%', background:'linear-gradient(135deg,#F97316,#FBBF24)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, boxShadow:'0 2px 8px rgba(249,115,22,0.35)' }}>👤</div>
          <div>
            <div style={{ color:'rgba(255,255,255,0.92)', fontSize:12, fontWeight:600, letterSpacing:'-0.01em' }}>太郎</div>
            <div style={{ color:'rgba(148,163,184,0.65)', fontSize:9.5 }}>分析担当</div>
          </div>
        </div>
      </div>

}

/* ══════════════════════════════════════════
   タブナビゲーション
══════════════════════════════════════════ */
function TabNav({ active, setActive }) {
  const tabs = [
    { id:'home',        label:'プロジェクトホーム',               icon:'🏠' },
    { id:'search',      label:'類似研究検索',                    icon:'📚', badge:'NEW' },
    { id:'cohort',      label:'コホート参照（フィージビリティ調査）', icon:'🔍', badge:'MAIN' },
    { id:'ai',          label:'AI分析アシスト（Genie）',          icon:'🤖' },
    { id:'databricks',  label:'Databricks 解析環境',              icon:'⬡',  badge:'NEW' },
  ];
  return (
    <div className="glass-blue" style={{ padding:'0 24px', display:'flex' }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => setActive(t.id)}
          style={{ padding:'13px 20px', background:'transparent', border:'none', borderBottom:active===t.id?`2.5px solid #F97316`:'2.5px solid transparent', color:active===t.id?'rgba(255,255,255,0.96)':'rgba(148,163,184,0.65)', cursor:'pointer', fontSize:13, fontWeight:active===t.id?700:400, display:'flex', alignItems:'center', gap:6, whiteSpace:'nowrap', transition:'all 0.16s', letterSpacing:active===t.id?'-0.01em':'0', fontFamily:'inherit' }}>
          {t.icon} {t.label}
          {t.badge && <span style={{ background:'linear-gradient(135deg,#F97316,#FBBF24)', color:'white', fontSize:9, padding:'1px 6px', borderRadius:999, fontWeight:700, letterSpacing:'0.04em', boxShadow:'0 1px 6px rgba(249,115,22,0.40)' }}>{t.badge}</span>}
        </button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   App ルート
══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('home');
  return (
    <div style={{ minHeight:'100vh' }}>
      <Header/>
      <TabNav active={tab} setActive={setTab}/>
      <main style={{ padding:'22px 24px', maxWidth:1440, margin:'0 auto' }}>
        {tab==='home'        && <HomeScreen setTab={setTab}/>}
        {tab==='search'      && <ResearchSearchScreen setTab={setTab}/>}
        {tab==='cohort'      && <CohortScreen/>}
        {tab==='ai'          && <AIScreen/>}
        {tab==='databricks'  && <DatabricksScreen/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
